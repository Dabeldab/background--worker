# Start everything:
#   docker compose up -d --build
#
# Rebuild after code changes:
#   docker compose up -d --build media-worker

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automation
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  media-worker:
    build: .
    container_name: media-worker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      WHISPER_MODEL: base
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      YTDLP_SUB_LANGS: "en.*,en-US.*"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    networks:
      - automation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=America/New_York
      - GENERIC_TIMEZONE=America/New_York
      - MEDIA_WORKER_URL=http://media-worker:8000
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - automation
    depends_on:
      postgres:
        condition: service_healthy
      media-worker:
        condition: service_healthy

networks:
  automation:

volumes:
  postgres_data:
  n8n_data:
  whisper_cache:

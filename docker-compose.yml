# Worker only (no second n8n container):
#   docker compose up -d --build media-worker
#
# Worker + bundled n8n (only if you do NOT already run n8n elsewhere):
#   docker compose --profile with-n8n up -d --build

services:
  media-worker:
    build: .
    container_name: media-worker
    restart: unless-stopped
    # Listen on the VPS loopback so n8n (host install or another container) can reach the API.
    # Only your server can use 127.0.0.1:8000; it is not open on the public internet.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      WHISPER_MODEL: base
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      YTDLP_SUB_LANGS: "en.*,en-US.*"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    networks:
      - automation

  n8n:
    profiles:
      - with-n8n
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=America/New_York
      - GENERIC_TIMEZONE=America/New_York
      - MEDIA_WORKER_URL=http://media-worker:8000
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - automation
    depends_on:
      - media-worker

networks:
  automation:

volumes:
  n8n_data:
  whisper_cache:
